name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-and-test:
    name: Dependencies and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies (package)
        run: dart pub get

      - name: Install dependencies (test fixtures)
        run: |
          cd test/fixtures/fake_all_observer && flutter pub get
          cd ../another_package && dart pub get
          cd ../consumer && flutter pub get
          cd ../smoke && flutter pub get

      - name: Install dependencies (example)
        run: cd example && flutter pub get

      - name: Analyze
        run: dart analyze

      - name: Analyze example
        run: cd example && dart analyze

      - name: Run tests
        run: dart test

      - name: Smoke-test plugin and runner fixes
        run: |
          cd test/fixtures/smoke
          dart run custom_lint
          cp fix_target.dart.template lib/fix_target.dart
          trap 'rm -f lib/fix_target.dart' EXIT
          dart run custom_lint --fix --no-fatal-infos --no-fatal-warnings
          grep -q 'disposeEffect();' lib/fix_target.dart

  lower-bounds:
    name: Lower bounds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install minimum dependency versions
        run: dart pub downgrade

      - name: Install fixture dependencies
        run: |
          cd test/fixtures/fake_all_observer && flutter pub get
          cd ../another_package && dart pub get
          cd ../consumer && flutter pub get
          cd ../smoke && flutter pub get

      - name: Analyze with minimum versions
        run: dart analyze

      - name: Test with minimum versions
        run: dart test
