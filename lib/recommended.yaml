# Recommended preset for all_observer_lint.
#
# Usage, in your project's analysis_options.yaml:
#
#   include: package:all_observer_lint/recommended.yaml
#
# This enables the rules considered safe enough for everyday use: low
# false-positive rate, clear diagnostics, and evidence-backed diagnostics for
# patterns that violate core reactive invariants.
analyzer:
  plugins:
    - custom_lint

all_observer:
  # Uncomment to switch every diagnostic message to Brazilian Portuguese.
  # language: pt-BR
  rules:
    - avoid_reactive_creation_in_build
    - avoid_effect_creation_in_build
    - watch_only_inside_build
    - dispose_reactive_resources
    - avoid_reactive_write_in_computed
    - avoid_set_state_in_computed
    - avoid_worker_creation_in_computed
    - avoid_io_in_computed
    - avoid_observable_write_during_observer_build
    - self_referencing_computed
