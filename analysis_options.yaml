# Lint configuration for the all_observer_lint package's own source code.
# This is unrelated to the rules the package ships for its consumers
# (see lib/recommended.yaml, lib/strict.yaml, lib/all.yaml).
include: package:lints/recommended.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # custom_lint_builder 0.7/analyzer 7 still expose several stable APIs
    # through the old element model. Keep the usage centralized in src/utils
    # and revisit when moving to analyzer 8+.
    deprecated_member_use: ignore
  exclude:
    - "test/fixtures/**"
    - "example/**"

linter:
  rules:
    - prefer_single_quotes
    - unawaited_futures
    - always_declare_return_types
